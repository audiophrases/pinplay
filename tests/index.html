<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PinPlay Test Suite</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; padding: 24px; }
h1 { margin-bottom: 8px; color: #58a6ff; font-size: 1.4rem; }
.summary { display: flex; gap: 16px; margin: 16px 0; font-size: 0.95rem; }
.badge { padding: 4px 12px; border-radius: 12px; font-weight: 600; }
.badge.pass { background: #1a3d2a; color: #3fb950; }
.badge.fail { background: #3d1a1a; color: #f85149; }
.badge.total { background: #1a2a3d; color: #58a6ff; }
.suite { margin: 12px 0; border: 1px solid #30363d; border-radius: 8px; overflow: hidden; }
.suite-name { background: #161b22; padding: 10px 16px; font-weight: 600; cursor: pointer; user-select: none; }
.suite-name:hover { background: #1c2333; }
.suite-name .arrow { display: inline-block; transition: transform 0.2s; margin-right: 8px; }
.suite-name.open .arrow { transform: rotate(90deg); }
.tests { display: none; padding: 4px 0; }
.tests.show { display: block; }
.test { padding: 6px 16px; display: flex; align-items: center; gap: 8px; font-size: 0.9rem; }
.test.pass::before { content: '✅'; }
.test.fail::before { content: '❌'; }
.test .name { flex: 1; }
.test .duration { color: #8b949e; font-size: 0.8rem; }
.error { color: #f85149; font-size: 0.8rem; margin-left: 24px; padding: 4px 16px; background: rgba(248,81,73,0.1); border-left: 2px solid #f85149; }
#runBtn { background: #238636; color: #fff; border: none; padding: 8px 20px; border-radius: 6px; font-size: 0.95rem; cursor: pointer; font-weight: 600; margin: 12px 0; }
#runBtn:hover { background: #2ea043; }
#results { margin-top: 16px; }
#timer { color: #8b949e; font-size: 0.85rem; margin-left: auto; }
</style>
</head>
<body>
<h1>🧪 PinPlay Test Suite</h1>
<p style="color:#8b949e;font-size:0.85rem;">Functions extracted from app.js/play.js — click ▶ to run all</p>
<button id="runBtn" onclick="runAll()">▶ Run Tests</button>
<div class="summary" id="summary" style="display:none"></div>
<div id="results"></div>

<script>
// ---- Functions under test ----

function normalizeTtsLanguage(value) {
  const key = String(value || '').trim().toUpperCase();
  const EDGE_TTS_LANGUAGE_DEFAULTS = { EN: 'en-US-AriaNeural', CA: 'ca-ES-EnricNeural', FR: 'fr-FR-DeniseNeural' };
  return EDGE_TTS_LANGUAGE_DEFAULTS[key] ? key : 'EN';
}

function normalizeQuizAudioDefaults(targetQuiz) {
  if (!targetQuiz || typeof targetQuiz !== 'object') return;
  const raw = String(targetQuiz.ttsLanguage || '').trim().toUpperCase();
  targetQuiz.ttsLanguage = ['NONE', 'EN', 'CA', 'FR', 'OTHER'].includes(raw) ? raw : 'NONE';
  targetQuiz.readAllQuestionsAloud = targetQuiz.ttsLanguage !== 'NONE' && targetQuiz.readAllQuestionsAloud !== false;
}

function getHearQuestionsMode(targetQuiz) {
  const raw = String(targetQuiz?.ttsLanguage || '').trim().toUpperCase();
  if (raw === 'NONE' || !raw) return 'NONE';
  return normalizeTtsLanguage(targetQuiz?.ttsLanguage);
}

function applyHearQuestionsMode(targetQuiz, modeValue) {
  if (!targetQuiz || typeof targetQuiz !== 'object') return;
  const mode = String(modeValue || '').trim().toUpperCase();
  if (mode === 'NONE') { targetQuiz.ttsLanguage = 'NONE'; targetQuiz.readAllQuestionsAloud = false; return; }
  if (mode === 'READ') { targetQuiz.ttsLanguage = 'EN'; targetQuiz.readAllQuestionsAloud = false; return; }
  targetQuiz.ttsLanguage = normalizeTtsLanguage(mode);
  targetQuiz.readAllQuestionsAloud = true;
}

function createEmptyQuiz() {
  return { version: 1, title: '', ttsLanguage: 'NONE', readAllQuestionsAloud: false, questions: [] };
}

function mimeToExt(dataUrl) {
  const match = dataUrl.match(/^data:([^;]+);base64,/);
  if (!match) return '.bin';
  const mime = match[1];
  if (mime.includes('mpeg') || mime.includes('mp3')) return '.mp3';
  if (mime.includes('jpeg') || mime.includes('jpg')) return '.jpg';
  if (mime.includes('png')) return '.png';
  if (mime.includes('webp')) return '.webp';
  if (mime.includes('gif')) return '.gif';
  return '.bin';
}

function shuffleSeeded(prompt, id, answers) {
  const seed = Math.abs([...((prompt || '') + (id || ''))].reduce((h, c) => ((h << 5) - h + c.charCodeAt(0)) | 0, 0)) || 1;
  const indices = answers.map((_, i) => i);
  let sr = seed;
  for (let s = indices.length - 1; s > 0; s--) {
    sr = (sr * 16807) % 2147483647;
    const j = sr % (s + 1);
    [indices[s], indices[j]] = [indices[j], indices[s]];
  }
  return indices.map(i => answers[i]);
}

function normalizeTextAnswer(text) {
  return String(text || '').toLowerCase().replace(/[~`!@#$%^&*(){}\[\];:"'<,>.?\/\\|\-_+=]/g, ' ').replace(/\s+/g, ' ').trim();
}

function parseAcceptedGapOptions(value) {
  return String(value || '').split(',').map((x) => normalizeTextAnswer(x)).filter(Boolean);
}

function contextGapExpectedOptions(gaps) {
  return (Array.isArray(gaps) ? gaps : []).map((g) => { const opts = parseAcceptedGapOptions(g); return opts.length ? opts : [normalizeTextAnswer(g)]; }).filter((opts) => opts.some(Boolean));
}

function isContextGapCorrect(guessRaw, gaps) {
  const guess = Array.isArray(guessRaw) ? guessRaw.map(normalizeTextAnswer).filter(Boolean) : [];
  const expected = contextGapExpectedOptions(gaps);
  if (!guess.length || guess.length !== expected.length) return false;
  return guess.every((g, i) => expected[i].includes(g));
}

function isMatchPairsCorrect(guessRaw, pairsRaw) {
  const pairs = (Array.isArray(pairsRaw) ? pairsRaw : []).map((p) => ({ left: normalizeTextAnswer(p?.left), right: normalizeTextAnswer(p?.right) })).filter((p) => p.left && p.right);
  if (!pairs.length) return false;
  if (Array.isArray(guessRaw) && guessRaw.some((x) => x && typeof x === 'object')) {
    const expectedCounts = new Map();
    pairs.forEach((p) => { const key = `${p.left}=>${p.right}`; expectedCounts.set(key, (expectedCounts.get(key) || 0) + 1); });
    const gotCounts = new Map();
    guessRaw.forEach((g) => { const left = normalizeTextAnswer(g?.left); const right = normalizeTextAnswer(g?.right); if (!left || !right) return; const key = `${left}=>${right}`; gotCounts.set(key, (gotCounts.get(key) || 0) + 1); });
    if (gotCounts.size !== expectedCounts.size) return false;
    for (const [k, v] of expectedCounts.entries()) { if ((gotCounts.get(k) || 0) !== v) return false; }
    return true;
  }
  return false;
}

function supportsQuestionAudio(type) {
  return ['mcq', 'multi', 'tf', 'text', 'open', 'image_open', 'context_gap', 'match_pairs', 'error_hunt', 'puzzle', 'slider', 'pin', 'audio'].includes(String(type || ''));
}

function escapeHtml(str) {
  return String(str || '').replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;').replaceAll('"', '&quot;').replaceAll("'", '&#39;');
}

function toSafeFilename(s) {
  return String(s || 'quiz').toLowerCase().replace(/[^a-z0-9-_]+/g, '-').replace(/^-+|-+$/g, '');
}

function validateImportedQuiz(data) {
  if (!data || typeof data !== 'object') throw new Error('Invalid JSON root.');
  if (!Array.isArray(data.questions)) throw new Error('Missing questions array.');
}

function clamp(n, min, max) {
  return Math.max(min, Math.min(max, Number.isFinite(n) ? n : min));
}

function computeCrazyCountScore(toScore, p, elapsedMs) {
  const target = Math.max(0, Math.round(Number(toScore || 0)));
  if (p >= 1) return target;
  const targetStr = String(target);
  const len = targetStr.length;
  const chars = targetStr.split('');
  for (let posFromRight = 0; posFromRight < len; posFromRight++) {
    const idx = len - 1 - posFromRight;
    const stopAt = 0.5 + (posFromRight * (0.45 / Math.max(1, len - 1)));
    if (p < stopAt) { chars[idx] = String(Math.floor((elapsedMs / 22 + (idx + 1) * 3) % 10)); }
  }
  const n = Number(chars.join(''));
  return Number.isFinite(n) ? n : target;
}

function tokenizeWords(text) {
  return String(text || '').trim().split(/\s+/).filter(Boolean);
}

function formatHistoryAnswer(entry) {
  if (!entry) return '(no answer)';
  if (Array.isArray(entry.answerText)) return entry.answerText.join(' | ');
  return String(entry.answerText || '(no answer)');
}

// ---- Test framework ----
const suites = [];
function describe(name, fn) {
  const tests = [];
  fn({ it: (tName, tFn) => tests.push({ name: tName, fn: tFn }) });
  suites.push({ name, tests });
}

// ---- TESTS ----

describe('normalizeTextAnswer', ({ it }) => {
  it('lowercases', () => { eq(normalizeTextAnswer('Hello World'), 'hello world'); });
  it('removes punctuation', () => { eq(normalizeTextAnswer('it is a test!'), 'it is a test'); });
  it('collapses whitespace', () => { eq(normalizeTextAnswer('  a   b  '), 'a b'); });
  it('handles null/empty', () => { eq(normalizeTextAnswer(null), ''); eq(normalizeTextAnswer(''), ''); });
  it('removes hyphens', () => { eq(normalizeTextAnswer('self-driving car'), 'self driving car'); });
  it('removes apostrophes', () => { eq(normalizeTextAnswer("don't"), 'don t'); });
  it('removes exclamation', () => { eq(normalizeTextAnswer('hello!'), 'hello'); });
});

describe('parseAcceptedGapOptions', ({ it }) => {
  it('parses single option', () => { deepEq(parseAcceptedGapOptions('hello'), ['hello']); });
  it('parses comma-separated', () => { deepEq(parseAcceptedGapOptions('hello, world'), ['hello', 'world']); });
  it('handles empty', () => { deepEq(parseAcceptedGapOptions(''), []); });
  it('trims whitespace', () => { deepEq(parseAcceptedGapOptions('  a , b  '), ['a', 'b']); });
  it('removes punctuation from options', () => { deepEq(parseAcceptedGapOptions("don't, can't"), ['don t', 'can t']); });
  it('filters empty entries', () => { deepEq(parseAcceptedGapOptions('a,,b,'), ['a', 'b']); });
});

describe('contextGapExpectedOptions', ({ it }) => {
  it('builds expected options from gaps', () => { const r = contextGapExpectedOptions(['hello, hi', 'world']); eq(r.length, 2); deepEq(r[0].sort(), ['hello','hi'].sort()); deepEq(r[1], ['world']); });
  it('filters empty gaps', () => { deepEq(contextGapExpectedOptions(['', null, '']), []); });
  it('handles non-array', () => { deepEq(contextGapExpectedOptions(null), []); });
});

describe('isContextGapCorrect', ({ it }) => {
  it('accepts correct answers', () => { ok(isContextGapCorrect(['hello', 'world'], ['hello', 'world'])); });
  it('rejects wrong answers', () => { ok(!isContextGapCorrect(['wrong', 'world'], ['hello', 'world'])); });
  it('handles alternatives', () => { ok(isContextGapCorrect(['hello', 'earth'], ['hello, hi', 'world, earth'])); });
  it('rejects wrong count', () => { ok(!isContextGapCorrect(['only one'], ['gap1', 'gap2'])); });
  it('rejects empty guess', () => { ok(!isContextGapCorrect([], ['hello'])); });
  it('punctuation-insensitive', () => { ok(isContextGapCorrect(["don t", "can t"], ["don t", "can t"])); ok(isContextGapCorrect(["DON T", "CAN T"], ["don t", "can t"])); });
});

describe('isMatchPairsCorrect', ({ it }) => {
  it('accepts correct pairs', () => { ok(isMatchPairsCorrect([{left:'A',right:'1'},{left:'B',right:'2'}],[{left:'A',right:'1'},{left:'B',right:'2'}])); });
  it('order-independent', () => { ok(isMatchPairsCorrect([{left:'B',right:'2'},{left:'A',right:'1'}],[{left:'A',right:'1'},{left:'B',right:'2'}])); });
  it('rejects wrong pairs', () => { ok(!isMatchPairsCorrect([{left:'A',right:'2'},{left:'B',right:'1'}],[{left:'A',right:'1'},{left:'B',right:'2'}])); });
  it('rejects incomplete', () => { ok(!isMatchPairsCorrect([{left:'A',right:'1'}],[{left:'A',right:'1'},{left:'B',right:'2'}])); });
  it('handles duplicate left', () => { ok(isMatchPairsCorrect([{left:'A',right:'1'},{left:'A',right:'2'}],[{left:'A',right:'1'},{left:'A',right:'2'}])); });
  it('case-insensitive', () => { ok(isMatchPairsCorrect([{left:'Apple',right:'Red'}],[{left:'apple',right:'red'}])); });
});

describe('supportsQuestionAudio', ({ it }) => {
  it('supports all valid types', () => { ['mcq','multi','tf','text','open','image_open','context_gap','match_pairs','error_hunt','puzzle','slider','pin','audio'].forEach(t => ok(supportsQuestionAudio(t), t)); });
  it('rejects invalid types', () => { ok(!supportsQuestionAudio('bogus')); ok(!supportsQuestionAudio('')); ok(!supportsQuestionAudio(null)); });
});

describe('escapeHtml', ({ it }) => {
  it('escapes < > &', () => { eq(escapeHtml('<b>Tom & Jerry</b>'), '&lt;b&gt;Tom &amp; Jerry&lt;/b&gt;'); });
  it('escapes quotes', () => { eq(escapeHtml('He said "hello"'), 'He said &quot;hello&quot;'); eq(escapeHtml("it's"), 'it&#39;s'); });
  it('handles null/empty', () => { eq(escapeHtml(null), ''); eq(escapeHtml(''), ''); });
  it('preserves safe text', () => { eq(escapeHtml('hello world'), 'hello world'); });
});

describe('toSafeFilename', ({ it }) => {
  it('lowercases and replaces spaces', () => { eq(toSafeFilename('My Quiz Title'), 'my-quiz-title'); });
  it('removes special characters', () => { eq(toSafeFilename("What's up?!"), 'what-s-up'); });
  it('strips leading/trailing dashes', () => { eq(toSafeFilename('!!!test'), 'test'); });
  it('defaults to "quiz"', () => { eq(toSafeFilename(''), 'quiz'); eq(toSafeFilename(null), 'quiz'); });
});

describe('validateImportedQuiz', ({ it }) => {
  it('accepts valid quiz', () => { noThrow(() => validateImportedQuiz({ questions: [] })); noThrow(() => validateImportedQuiz({ questions: [{ prompt: 'Q1' }] })); });
  it('rejects non-object', () => { throws(() => validateImportedQuiz(null), /Invalid JSON root/); throws(() => validateImportedQuiz('string'), /Invalid JSON root/); });
  it('rejects missing questions', () => { throws(() => validateImportedQuiz({}), /Missing questions array/); throws(() => validateImportedQuiz({ questions: 'not array' }), /Missing questions array/); });
});

describe('clamp', ({ it }) => {
  it('clamps within range', () => { eq(clamp(5, 0, 10), 5); eq(clamp(-5, 0, 10), 0); eq(clamp(15, 0, 10), 10); });
  it('handles non-finite', () => { eq(clamp(Infinity, 0, 10), 0); eq(clamp(NaN, 0, 10), 0); });
  it('exact boundaries', () => { eq(clamp(0, 0, 10), 0); eq(clamp(10, 0, 10), 10); });
});

describe('computeCrazyCountScore', ({ it }) => {
  it('returns target when p=1', () => { eq(computeCrazyCountScore(1000, 1, 0), 1000); eq(computeCrazyCountScore(500, 1, 9999), 500); });
  it('returns 0 for zero target', () => { eq(computeCrazyCountScore(0, 1, 0), 0); });
  it('returns numeric for p<1', () => { const r = computeCrazyCountScore(1000, 0.5, 1000); eq(typeof r, 'number'); });
  it('is deterministic', () => { eq(computeCrazyCountScore(1000, 0.3, 5000), computeCrazyCountScore(1000, 0.3, 5000)); });
});

describe('tokenizeWords', ({ it }) => {
  it('splits on whitespace', () => { deepEq(tokenizeWords('hello world'), ['hello', 'world']); });
  it('collapses spaces', () => { deepEq(tokenizeWords('a   b  c'), ['a', 'b', 'c']); });
  it('handles null/empty', () => { deepEq(tokenizeWords(null), []); deepEq(tokenizeWords(''), []); });
});

describe('formatHistoryAnswer', ({ it }) => {
  it('formats array', () => { eq(formatHistoryAnswer({ answerText: ['A', 'B'] }), 'A | B'); });
  it('formats string', () => { eq(formatHistoryAnswer({ answerText: 'hello' }), 'hello'); });
  it('null fallback', () => { eq(formatHistoryAnswer(null), '(no answer)'); });
  it('empty fallback', () => { eq(formatHistoryAnswer({ answerText: '' }), '(no answer)'); });
});

describe('Seeded shuffle', ({ it }) => {
  it('host/student match', () => { deepEq(shuffleSeeded('Q?','','A','B','C','D'), shuffleSeeded('Q?','','A','B','C','D')); });
  it('different prompts diverge', () => { const a = ['A','B','C','D','E']; notDeepEq(shuffleSeeded('X','',a), shuffleSeeded('Y','',a)); });
  it('handles empty', () => { deepEq(shuffleSeeded('t','',[]), []); });
  it('preserves items', () => { const a = ['A','B','C']; deepEq(shuffleSeeded('t','',a).sort(), a.sort()); });
  it('handles unicode', () => { const a = ['a','b','c']; deepEq(shuffleSeeded('Català','',a), shuffleSeeded('Català','',a)); });
  it('deterministic', () => { const a = ['1','2','3','4','5']; deepEq(shuffleSeeded('Q','',a), shuffleSeeded('Q','',a)); });
});

describe('TTS audio defaults', ({ it }) => {
  it('normalizeTtsLanguage: known languages', () => { eq(normalizeTtsLanguage('EN'), 'EN'); eq(normalizeTtsLanguage('CA'), 'CA'); eq(normalizeTtsLanguage('FR'), 'FR'); });
  it('normalizeTtsLanguage: unknown → EN', () => { eq(normalizeTtsLanguage('DE'), 'EN'); eq(normalizeTtsLanguage(''), 'EN'); eq(normalizeTtsLanguage(null), 'EN'); });
  it('normalizeTtsLanguage: case-insensitive', () => { eq(normalizeTtsLanguage('en'), 'EN'); eq(normalizeTtsLanguage('ca'), 'CA'); });
  it('normalizeQuizAudioDefaults: empty → NONE', () => { const q = {}; normalizeQuizAudioDefaults(q); eq(q.ttsLanguage, 'NONE'); eq(q.readAllQuestionsAloud, false); });
  it('normalizeQuizAudioDefaults: EN → readAll true', () => { const q = { ttsLanguage: 'EN' }; normalizeQuizAudioDefaults(q); eq(q.readAllQuestionsAloud, true); });
  it('normalizeQuizAudioDefaults: keeps disabled', () => { const q = { ttsLanguage: 'EN', readAllQuestionsAloud: false }; normalizeQuizAudioDefaults(q); eq(q.readAllQuestionsAloud, false); });
  it('normalizeQuizAudioDefaults: NONE forces false', () => { const q = { ttsLanguage: 'NONE', readAllQuestionsAloud: true }; normalizeQuizAudioDefaults(q); eq(q.readAllQuestionsAloud, false); });
  it('normalizeQuizAudioDefaults: READ → NONE', () => { const q = { ttsLanguage: 'READ' }; normalizeQuizAudioDefaults(q); eq(q.ttsLanguage, 'NONE'); });
  it('normalizeQuizAudioDefaults: null safe', () => { noThrow(() => normalizeQuizAudioDefaults(null)); });
  it('getHearQuestionsMode: empty → NONE', () => { eq(getHearQuestionsMode({ ttsLanguage: '' }), 'NONE'); eq(getHearQuestionsMode({}), 'NONE'); eq(getHearQuestionsMode(null), 'NONE'); });
  it('getHearQuestionsMode: NONE', () => { eq(getHearQuestionsMode({ ttsLanguage: 'NONE' }), 'NONE'); });
  it('getHearQuestionsMode: languages', () => { eq(getHearQuestionsMode({ ttsLanguage: 'EN' }), 'EN'); eq(getHearQuestionsMode({ ttsLanguage: 'CA' }), 'CA'); });
  it('applyHearQuestionsMode: NONE', () => { const q = { ttsLanguage: 'EN', readAllQuestionsAloud: true }; applyHearQuestionsMode(q, 'NONE'); eq(q.ttsLanguage, 'NONE'); eq(q.readAllQuestionsAloud, false); });
  it('applyHearQuestionsMode: READ', () => { const q = {}; applyHearQuestionsMode(q, 'READ'); eq(q.ttsLanguage, 'EN'); eq(q.readAllQuestionsAloud, false); });
  it('applyHearQuestionsMode: language', () => { const q = {}; applyHearQuestionsMode(q, 'CA'); eq(q.ttsLanguage, 'CA'); eq(q.readAllQuestionsAloud, true); });
  it('createEmptyQuiz: defaults', () => { const q = createEmptyQuiz(); eq(q.ttsLanguage, 'NONE'); eq(q.readAllQuestionsAloud, false); eq(q.questions.length, 0); });
});

describe('MIME to extension', ({ it }) => {
  it('maps types', () => { eq(mimeToExt('data:image/jpeg;base64,x'), '.jpg'); eq(mimeToExt('data:image/png;base64,x'), '.png'); eq(mimeToExt('data:image/webp;base64,x'), '.webp'); eq(mimeToExt('data:image/gif;base64,x'), '.gif'); eq(mimeToExt('data:audio/mpeg;base64,x'), '.mp3'); });
  it('unknown → .bin', () => { eq(mimeToExt('data:application/octet-stream;base64,x'), '.bin'); eq(mimeToExt('https://x.com/img.jpg'), '.bin'); eq(mimeToExt(''), '.bin'); });
});

describe('Auto-fill image detection', ({ it }) => {
  it('finds needs', () => { const qs = [{imageKeyword:'',imageData:null},{imageKeyword:'volcano',imageData:null},{imageKeyword:'x',imageData:'data:...'},{imageKeyword:'y',imageData:'https://r2.dev'}]; const n = qs.filter(q => !q.imageData && q.imageKeyword); eq(n.length, 1); eq(n[0].imageKeyword, 'volcano'); });
  it('skips no-keyword', () => { eq([{imageKeyword:'',imageData:null}].filter(q => !q.imageData && q.imageKeyword).length, 0); });
  it('skips has-image', () => { eq([{imageKeyword:'x',imageData:'https://...'}].filter(q => !q.imageData && q.imageKeyword).length, 0); });
});

// ---- Helpers ----
function eq(a, b) { if (a !== b) throw `${JSON.stringify(a)} !== ${JSON.stringify(b)}`; }
function deepEq(a, b) { if (JSON.stringify(a) !== JSON.stringify(b)) throw `${JSON.stringify(a)} !== ${JSON.stringify(b)}`; }
function ok(v) { if (!v) throw `expected truthy, got ${v}`; }
function notDeepEq(a, b) { if (JSON.stringify(a) === JSON.stringify(b)) throw `should differ: ${JSON.stringify(a)}`; }
function throws(fn, pattern) { try { fn(); } catch (e) { if (pattern && !pattern.test(e.message)) throw `wrong error: ${e.message}`; return; } throw 'expected error'; }
function noThrow(fn) { fn(); }

// ---- Runner ----
async function runAll() {
  const btn = document.getElementById('runBtn');
  btn.disabled = true; btn.textContent = '⏳ Running...';
  const resultsEl = document.getElementById('results');
  const summaryEl = document.getElementById('summary');
  resultsEl.innerHTML = '';
  summaryEl.style.display = 'none';

  let pass = 0, fail = 0;
  const t0 = performance.now();

  for (const suite of suites) {
    const div = document.createElement('div');
    div.className = 'suite';
    const nameDiv = document.createElement('div');
    nameDiv.className = 'suite-name open';
    nameDiv.innerHTML = `<span class="arrow">▶</span>${suite.name}`;
    nameDiv.onclick = () => { nameDiv.classList.toggle('open'); testsDiv.classList.toggle('show'); };
    const testsDiv = document.createElement('div');
    testsDiv.className = 'tests show';

    for (const t of suite.tests) {
      const testDiv = document.createElement('div');
      const tStart = performance.now();
      let err = null;
      try { await t.fn(); } catch (e) { err = e; }
      const dur = (performance.now() - tStart).toFixed(1);
      testDiv.className = `test ${err ? 'fail' : 'pass'}`;
      err ? fail++ : pass++;
      testDiv.innerHTML = `<span class="name">${t.name}</span><span class="duration">${dur}ms</span>`;
      testsDiv.appendChild(testDiv);
      if (err) {
        const errDiv = document.createElement('div');
        errDiv.className = 'error';
        errDiv.textContent = String(err);
        testsDiv.appendChild(errDiv);
      }
    }

    div.appendChild(nameDiv);
    div.appendChild(testsDiv);
    resultsEl.appendChild(div);
  }

  const elapsed = (performance.now() - t0).toFixed(0);
  summaryEl.style.display = 'flex';
  summaryEl.innerHTML = `
    <span class="badge total">${pass + fail} tests</span>
    <span class="badge pass">${pass} passed</span>
    <span class="badge fail">${fail} failed</span>
    <span id="timer">⏱ ${elapsed}ms</span>
  `;
  btn.disabled = false; btn.textContent = '▶ Run Tests';
}
</script>
</body>
</html>
