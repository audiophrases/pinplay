<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PinPlay · Student</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>🎯 PinPlay</h1>
    </header>

    <main class="container">
      <section class="panel active">
        <div class="card" id="joinCard">
          <h2 id="joinTitle">Join game</h2>

          <div id="joinStepPin">
            <label>PIN</label>
            <input id="joinPin" type="text" maxlength="6" placeholder="123456" />
            <button id="validatePinBtn" class="btn primary top-space">Continue</button>
          </div>

          <div id="joinStepIdentity" class="hidden top-space">
            <p id="joinModeHint" class="small"></p>
            <div id="joinNameWrap">
              <label>Name</label>
              <input id="joinName" type="text" maxlength="40" placeholder="Your name" />
            </div>
            <button id="joinBtn" class="btn primary top-space">Join live game</button>
          </div>

          <p id="joinStatus" class="feedback"></p>

          <div id="joinQuestionWrap" class="hidden top-space">
            <div class="row spread">
              <div id="joinProgress">Question 1 / 1</div>
              <div id="joinScore">Score: 0</div>
            </div>
            <h3 id="joinPrompt"></h3>
            <div id="joinAnswers"></div>
            <div class="row gap top-space">
              <button id="joinSubmitBtn" class="btn primary">Submit answer</button>
            </div>
            <p id="joinFeedback" class="feedback"></p>
          </div>
        </div>
      </section>
    </main>

    <script src="play.js"></script>
  </body>
</html>
