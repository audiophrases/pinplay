name = "pinplay-api"
account_id = "b7cc0719d9ecb3485646785035f87ca1"
main = "worker.js"
compatibility_date = "2026-03-04"

[[r2_buckets]]
binding = "QUIZ_MEDIA"
bucket_name = "pinplay-quiz-media"

[[durable_objects.bindings]]
name = "ROOMS"
class_name = "QuizRoom"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["QuizRoom"]

[[unsafe.bindings]]
name = "AUTH_RL"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 50, period = 60 }
